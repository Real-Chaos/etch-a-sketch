<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos | Sketch</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/png">
</head>
<body>
    <!--Grid-------------------------------------------------------------------------------------------------------------------------->
    <div class="container">
        <div class="container2">
            
        </div>
    </div>
    <!-- Setting --------------------------------------------------------------------------------------------------------------------->
    <div class="settings">
        
            <div class="color-div">
            <input type="color" name="color" id="color">
            <label for="color" class="color">Pen Color</label>
            <br>
            <input type="color" name="color" id="color" class="bg-color">
            <label for="bg-color" class="color">Color Fill</label>
            <br>
            <input type="color" name="color" id="color" class="borderColor">
            <label for="border-color" class="borderColorH1 color">Grid Line Color</label>
            </div>
        <h1 class="h1">Change Pen Design</h1>
        <div class="cursor">
        <img class='cursor1' src="images/cursor1.png" alt="">
        <img src="images/cursor2.png" alt="">
        <img src="images/cursor3.png" alt="">
        <img src="images/cursor4.png" alt="">
        <img src="images/cursor5.png" alt="">
        <img src="images/cursor6.png" alt="">
        </div>
        <h1 class="h1">Theme</h1>
        <div class="theme">
            <img src="images/theme1.jpg" alt="">
            <img src="images/theme2.jpg" alt="">
            <img src="images/theme3.jpg" alt="">
            <br>
            <div class="radio">
            <label for="Light" class="light">Light
            <input type="radio" name="theme" id="light" class="light">
            </label>
            <label for="dark" class="dark">
            <input type="radio" name="theme" id="dark" class="dark">
            Dark</label>
            </div>
        </div>
        <br>
        <button class="rainbow">Toggle Rainbow</button>
        <button class="gridLines">Toggle Gridlines</button>
        <button class="eraser">Eraser</button>
        <input type="range" name="range" id="range" min="1" max="50">
        <p class="gridSizeIndicator">26 x 26</p>
        <button class="delete">Delete</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
